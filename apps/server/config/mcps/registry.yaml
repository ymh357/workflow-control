notion:
  description: Read/write Notion pages, databases, and comments
  command: npx
  args:
    - -y
    - "@notionhq/notion-mcp-server"
  env:
    OPENAPI_MCP_HEADERS:
      json:
        Authorization: Bearer ${NOTION_TOKEN}
        Notion-Version: 2022-06-28
figma:
  description: Read Figma designs, extract design tokens, and get screenshots
  command: npx
  args:
    - -y
    - figma-developer-mcp
    - --stdio
  env:
    FIGMA_API_KEY: ${FIGMA_ACCESS_TOKEN}
context7:
  description: Retrieve up-to-date documentation and code examples for any library
  command: npx
  args:
    - -y
    - "@upstash/context7-mcp@latest"
pulsemcp:
  description: Search and discover MCP servers from the PulseMCP directory (9000+ servers)
  command: npx
  args:
    - -y
    - pulsemcp-server
linear:
  description: "Linear project management — issues, projects, teams, and comments"
  command: npx
  args:
    - -y
    - mcp-remote
    - "https://mcp.linear.app/mcp"

gitlab:
  description: "GitLab API — repositories, merge requests, issues, pipelines, and CI/CD"
  command: npx
  args:
    - -y
    - "@modelcontextprotocol/server-gitlab"
  env:
    GITLAB_PERSONAL_ACCESS_TOKEN: "${GITLAB_PERSONAL_ACCESS_TOKEN}"
    GITLAB_API_URL: "${GITLAB_API_URL}"
