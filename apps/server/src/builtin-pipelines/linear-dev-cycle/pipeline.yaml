name: Linear Dev Cycle
description: End-to-end development workflow driven by Linear tickets. Gathers
  context from Linear, Notion, and Figma, plans implementation with human
  approval, implements code, runs tests, verifies CI, and submits a GitLab merge
  request.
engine: claude
use_cases:
  - End-to-end feature development from Linear ticket to GitLab merge request
  - Automated code implementation with human oversight at plan and review stages
  - Multi-source context gathering (Linear + Notion + Figma) for informed
    development
display:
  title_path: ticketContext.ticketTitle
  completion_summary_path: mergeRequestResult.mrUrl
skills:
  - finishing-branch
  - security-review

store_schema:
  ticketContext:
    produced_by: fetchTicket
    description: Ticket Context
    fields:
      ticketId:
        type: string
        description: Linear ticket identifier
      ticketTitle:
        type: string
        description: Title of the Linear ticket
      ticketDescription:
        type: string
        description: Full description of the ticket
      priority:
        type: string
        description: Ticket priority level
        display_hint: badge
      labels:
        type: string[]
        description: Labels assigned to the ticket
      notionUrl:
        type: string
        description: URL to related Notion document
      figmaUrl:
        type: string
        description: URL to related Figma design
      gitlabRepoUrl:
        type: string
        description: GitLab repository URL for the project
      repoName:
        type: string
        description: Short repository name extracted from GitLab URL (e.g. my-app)
      ticketSlug:
        type: string
        description: URL-friendly slug derived from ticket
      summary:
        type: string
        description: Brief summary of the ticket for downstream stages
  notionDoc:
    produced_by: gatherNotion
    description: Notion Document
    fields:
      hasDoc:
        type: boolean
        description: Whether a Notion document was found
        display_hint: badge
      requirements:
        type: string
        description: Extracted requirements from the Notion doc
      acceptanceCriteria:
        type: string
        description: Acceptance criteria from the Notion doc
      technicalNotes:
        type: string
        description: Technical notes and implementation hints
      embeddedFigmaUrl:
        type: string
        description: Figma URL embedded within the Notion document
      summary:
        type: string
        description: Brief summary of the Notion document content
  figmaDesign:
    produced_by: extractFigma
    description: Figma Design
    fields:
      hasDesign:
        type: boolean
        description: Whether a Figma design was found
        display_hint: badge
      componentStructure:
        type: string
        description: Component hierarchy and structure from the design
      layoutDescription:
        type: string
        description: Layout and spacing description
      styles:
        type: string
        description: Colors, typography, and styling tokens
      interactionStates:
        type: string
        description: Interactive states (hover, active, disabled, etc.)
      summary:
        type: string
        description: Brief summary of the Figma design
  figmaDesignFromNotion:
    produced_by: extractFigmaFromNotion
    description: Figma Design (from Notion)
    fields:
      hasDesign:
        type: boolean
        description: Whether a Figma design was found via Notion embed
        display_hint: badge
      componentStructure:
        type: string
        description: Component hierarchy and structure from the design
      layoutDescription:
        type: string
        description: Layout and spacing description
      styles:
        type: string
        description: Colors, typography, and styling tokens
      interactionStates:
        type: string
        description: Interactive states (hover, active, disabled, etc.)
      summary:
        type: string
        description: Brief summary of the Figma design extracted from Notion
  implementationPlan:
    produced_by: planImplementation
    description: Implementation Plan
    fields:
      filesToChange:
        type: string[]
        description: List of files that will be created or modified
      approach:
        type: string
        description: High-level implementation approach
      testStrategy:
        type: string
        description: Testing strategy and scope
      testCommand:
        type: string
        description: Command to run tests
      lintCommand:
        type: string
        description: Command to run linter
      typeCheckCommand:
        type: string
        description: Command to run type checking
      risks:
        type: string[]
        description: Identified risks and concerns
      detectedStack:
        type: string
        description: Detected technology stack
      summary:
        type: string
        description: Brief summary of the implementation plan
  branchInfo:
    produced_by: createBranch
    description: Branch Info
    hidden: true
    fields:
      branchName:
        type: string
        description: Name of the created Git branch
      gitlabProjectId:
        type: string
        description: GitLab project ID
      summary:
        type: string
        description: Brief summary of branch creation
  worktreePath:
    produced_by: setupWorktree
    description: Worktree Path
    hidden: true
    fields:
      worktreePath:
        type: string
        description: Absolute path to the isolated git worktree
  implementationResult:
    produced_by: implement
    description: Implementation Result
    fields:
      filesChanged:
        type: string[]
        description: List of files that were changed
      linesAdded:
        type: number
        description: Total lines added
      linesRemoved:
        type: number
        description: Total lines removed
      summary:
        type: string
        description: Brief summary of the implementation
  testResult:
    produced_by: testAndFix
    description: Test Result
    fields:
      passed:
        type: boolean
        description: Whether all tests passed
        display_hint: badge
      blockers:
        type: string[]
        description: Blocking issues if tests failed
      testsPassed:
        type: number
        description: Number of tests that passed
      testsFailed:
        type: number
        description: Number of tests that failed
      roundsUsed:
        type: number
        description: Number of test-fix rounds used
      summary:
        type: string
        description: Brief summary of test results
  ciResult:
    produced_by: verifyCI
    description: CI Result
    fields:
      ciPassed:
        type: boolean
        description: Whether CI pipeline passed
        display_hint: badge
      pipelineUrl:
        type: string
        description: URL to the CI pipeline run
        display_hint: link
      createdCiConfig:
        type: boolean
        description: Whether a CI config was created if missing
      summary:
        type: string
        description: Brief summary of CI verification
  mergeRequestResult:
    produced_by: submitMergeRequest
    description: Merge Request Result
    fields:
      mrUrl:
        type: string
        description: URL to the created merge request
        display_hint: link
      mrDescription:
        type: string
        description: Description body of the merge request
      ticketUpdated:
        type: boolean
        description: Whether the Linear ticket was updated
      slackNotified:
        type: boolean
        description: Whether Slack notification was sent
      summary:
        type: string
        description: Brief summary of the merge request submission

stages:
  - name: fetchTicket
    type: agent
    effort: medium
    max_turns: 30
    max_budget_usd: 2
    thinking:
      type: enabled
    mcps:
      - linear
    interactive: true
    runtime:
      engine: llm
      system_prompt: fetch-ticket
      disallowed_tools:
        - Edit
        - Write
        - Bash
  - name: awaitingTicketConfirm
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: fetchTicket
      max_feedback_loops: 2
  - parallel:
      name: gatherContext
      stages:
        - name: gatherNotion
          type: agent
          effort: medium
          max_turns: 30
          max_budget_usd: 2
          mcps:
            - notion
          runtime:
            engine: llm
            system_prompt: gather-notion
            reads:
              notionUrl: ticketContext.notionUrl
              ticketTitle: ticketContext.ticketTitle
            disallowed_tools:
              - Edit
              - Write
              - Bash
        - name: extractFigma
          type: agent
          effort: medium
          max_turns: 30
          max_budget_usd: 2
          mcps:
            - figma
          runtime:
            engine: llm
            system_prompt: extract-figma
            reads:
              figmaUrl: ticketContext.figmaUrl
            disallowed_tools:
              - Edit
              - Write
              - Bash
  - name: resolveFigma
    type: condition
    runtime:
      engine: condition
      branches:
        - when: store.figmaDesign.hasDesign == false and store.notionDoc.embeddedFigmaUrl
            != ''
          to: extractFigmaFromNotion
        - default: true
          to: planImplementation
  - name: extractFigmaFromNotion
    type: agent
    effort: medium
    max_turns: 30
    max_budget_usd: 2
    mcps:
      - figma
    runtime:
      engine: llm
      system_prompt: extract-figma-from-notion
      reads:
        figmaUrl: notionDoc.embeddedFigmaUrl
      disallowed_tools:
        - Edit
        - Write
        - Bash
  - name: planImplementation
    type: agent
    effort: high
    max_turns: 50
    max_budget_usd: 4
    thinking:
      type: enabled
    runtime:
      engine: llm
      system_prompt: plan-implementation
      reads:
        ticket: ticketContext
        notionDoc: notionDoc.summary
        figmaDesign: figmaDesign.summary
        figmaDesignFromNotion: figmaDesignFromNotion.summary
      disallowed_tools:
        - Edit
        - Write
        - Bash
  - name: confirmPlan
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: planImplementation
      max_feedback_loops: 3
      notify:
        type: slack
        template: confirmPlan
  - name: createBranch
    type: agent
    effort: low
    max_turns: 15
    max_budget_usd: 1
    mcps:
      - gitlab
      - linear
    runtime:
      engine: llm
      system_prompt: create-branch
      reads:
        ticketId: ticketContext.ticketId
        ticketSlug: ticketContext.ticketSlug
        gitlabRepoUrl: ticketContext.gitlabRepoUrl
  - name: setupWorktree
    type: script
    runtime:
      engine: script
      script_id: git_worktree
      reads:
        repoName: ticketContext.repoName
  - name: implement
    type: agent
    effort: high
    max_turns: 100
    max_budget_usd: 10
    thinking:
      type: enabled
    mcps:
      - context7
    runtime:
      engine: llm
      system_prompt: implement
      reads:
        plan: implementationPlan
        branchInfo: branchInfo
        ticketTitle: ticketContext.ticketTitle
    on_complete:
      notify: slack
  - name: testAndFix
    type: agent
    effort: high
    max_turns: 60
    max_budget_usd: 6
    thinking:
      type: enabled
    runtime:
      engine: llm
      system_prompt: test-and-fix
      reads:
        plan: implementationPlan
        implementation: implementationResult
      retry:
        max_retries: 2
        back_to: implement
  - name: verifyCI
    type: agent
    effort: medium
    max_turns: 40
    max_budget_usd: 3
    mcps:
      - gitlab
    runtime:
      engine: llm
      system_prompt: verify-ci
      reads:
        branchInfo: branchInfo
        gitlabRepoUrl: ticketContext.gitlabRepoUrl
  - name: confirmBeforeMR
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: implement
      max_feedback_loops: 2
      notify:
        type: slack
        template: confirmBeforeMR
  - name: submitMergeRequest
    type: agent
    effort: medium
    max_turns: 30
    max_budget_usd: 2
    mcps:
      - gitlab
      - linear
    runtime:
      engine: llm
      system_prompt: submit-merge-request
      reads:
        ticket: ticketContext
        plan: implementationPlan
        testResult: testResult
        ciResult: ciResult
        branchInfo: branchInfo
        implementation: implementationResult
    on_complete:
      notify: slack
