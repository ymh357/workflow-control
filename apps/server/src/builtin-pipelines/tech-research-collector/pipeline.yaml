name: "Tech Research Collector"
description: "Sub-pipeline that collects primary sources for a single research target. Invoked per-item by tech-research foreach."
engine: claude
injected_context:
  - pipelineConfig
  - projectContext

store_schema:
  targetSources:
    produced_by: collectTargetSources
    description: Target Source Data
    fields:
      targetName:
        type: string
        description: Name of the target being researched
      subjectType:
        type: string
        description: Subject type of this specific target
      officialSourceCount:
        type: number
        description: Number of official sources consulted
      spaWarnings:
        type: string[]
        description: URLs blocked by SPA rendering
      sourceCatalog:
        type: string[]
        description: "All URLs consulted: '{url} | {status} | {notes}'"
      extractedFacts:
        type: string[]
        description: "Key facts extracted with source: '{fact} — Source: {url}'"
      reportPath:
        type: string
        description: File path to per-target source notes
      summary:
        type: string
        description: One-paragraph summary

stages:
  - name: collectTargetSources
    type: agent
    thinking:
      type: enabled
    effort: high
    max_turns: 35
    max_budget_usd: 2
    runtime:
      engine: llm
      system_prompt: collect-target-sources
      reads:
        pipelineConfig: pipelineConfig
        projectContext: projectContext
