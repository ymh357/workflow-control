name: Tech Research
description: Produce a decision-ready technology research brief. Scopes the question, surveys the landscape, deep-dives into candidate solutions, compares them on explicit criteria, and emits an executive brief.
engine: claude
official: true
use_cases:
  - Evaluate an unfamiliar technology for adoption
  - Compare 2-5 candidate solutions before making a selection
  - Produce a team-ready briefing on a specific technology topic

display:
  title_path: scope.topic
  completion_summary_path: brief.executiveSummary

store_schema:
  scope:
    produced_by: scope
    description: Research scope
    fields:
      topic:
        type: string
        description: The technology / question under research (one line)
        required: true
      questions:
        type: string[]
        description: 3-7 concrete research questions driving the work
        required: true
      decisionContext:
        type: markdown
        description: Why this research is happening and what decision it supports
      nonGoals:
        type: string[]
        description: Explicitly out-of-scope topics

  survey:
    produced_by: survey
    description: Landscape survey
    fields:
      landscape:
        type: markdown
        description: One-page overview of the problem space and major approaches
        required: true
      candidates:
        type: object[]
        description: >
          Candidate solutions. Each entry: { name, url, oneliner, category }.
        required: true
      keySources:
        type: object[]
        description: >
          Primary sources worth reading. Each entry: { title, url, why }.

  deepdive:
    produced_by: deepdive
    description: Per-candidate deep analysis
    fields:
      perCandidate:
        type: object[]
        description: >
          One entry per candidate: { name, maturity, communityActivity,
          adoption, strengths, weaknesses, risks }.
        required: true

  comparison:
    produced_by: compare
    description: Scored comparison
    fields:
      criteria:
        type: string[]
        description: Scoring dimensions (typically 4-7, aligned to scope.questions)
        required: true
      scorecard:
        type: object[]
        description: >
          Per-candidate scorecard: { candidate, scores: object, rationale }.
          Scores is a map of criterion -> numeric (1-5) or short string verdict.
        required: true
      recommendation:
        type: markdown
        description: Which candidate wins for this decision context, and why
        required: true

  brief:
    produced_by: brief
    description: Decision-ready brief
    fields:
      executiveSummary:
        type: markdown
        description: One-paragraph TL;DR for a decision-maker
        required: true
      whenToUse:
        type: markdown
        description: Conditions under which the recommendation applies
      whenNotToUse:
        type: markdown
        description: Red flags / situations where the recommendation fails
      openQuestions:
        type: string[]
        description: Questions the research could not answer
      references:
        type: object[]
        description: "Citation list: { title, url }"

stages:
  - name: scope
    type: agent
    interactive: true
    runtime:
      engine: llm
      system_prompt: scope
      reads: {}
    effort: medium
    max_turns: 20
    max_budget_usd: 1

  - name: scopeGate
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: scope

  - name: survey
    type: agent
    runtime:
      engine: llm
      system_prompt: survey
      reads:
        scope: scope
    effort: high
    max_turns: 40
    max_budget_usd: 3

  - name: deepdive
    type: agent
    runtime:
      engine: llm
      system_prompt: deepdive
      reads:
        scope: scope
        survey: survey
    effort: high
    max_turns: 60
    max_budget_usd: 5

  - name: compare
    type: agent
    runtime:
      engine: llm
      system_prompt: compare
      reads:
        scope: scope
        deepdive: deepdive
    effort: high
    max_turns: 30
    max_budget_usd: 3

  - name: brief
    type: agent
    runtime:
      engine: llm
      system_prompt: brief
      reads:
        scope: scope
        survey: survey
        deepdive: deepdive
        comparison: comparison
    effort: medium
    max_turns: 20
    max_budget_usd: 2
