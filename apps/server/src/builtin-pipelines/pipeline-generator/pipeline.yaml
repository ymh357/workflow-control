name: Pipeline Generator
description: Generate high-quality pipelines from natural language descriptions. Analyzes requirements, designs architecture, generates YAML skeleton and system prompts in parallel, validates, and persists to disk.
engine: claude
official: true
use_cases:
  - Create new workflow pipelines from descriptions
  - Generate pipeline configurations for recurring tasks
  - Bootstrap pipeline prototypes for iteration

external_inputs:
  taskDescription:
    type: string
    description: Natural language description of the pipeline to generate.
    required: true

display:
  title_path: pipelineDesign.pipelineName
  completion_summary_path: persistResult.pipelineId

store_schema:
  pipelineDesign:
    produced_by: analyzing
    description: Pipeline Design
    fields:
      pipelineName:
        type: string
        description: Human-readable pipeline name
        required: true
      pipelineId:
        type: string
        description: Directory-safe pipeline ID (kebab-case)
        required: true
      description:
        type: string
        description: Pipeline description
        required: true
      engine:
        type: string
        description: Default engine (claude/gemini/mixed)
        required: true
      stageDesign:
        type: markdown
        description: Detailed stage-by-stage design with data flow
        required: true
      dataFlowSummary:
        type: markdown
        description: Store key flow diagram
      useCases:
        type: string[]
        description: Target use cases
      estimatedStageCount:
        type: number
        description: Total stage count
      usesParallelGroups:
        type: boolean
        description: Whether parallel groups are used
      recommendedMcps:
        type: string[]
        description: MCP server names discovered via PulseMCP that should be used in the pipeline
      recommendedSkills:
        type: string[]
        description: Skill names discovered externally that should be used in the pipeline
      targetRepoName:
        type: string
        description: Repository name extracted from task description (empty string if not specified)
      assumptions:
        type: string[]
        description: Assumptions made when user input was ambiguous (shown to user at confirmation gate)
      stageContracts:
        type: object[]
        description: >
          Structured naming contracts for each stage (including parallel group children).
          Each entry: { name: string, type: string, systemPrompt?: string, writes?: string[] }.
          This is the authoritative naming source consumed by both downstream generators.
        required: true
      summary:
        type: markdown
        description: Design summary for user review
        required: true
  pipelineYaml:
    produced_by: genSkeleton
    description: Pipeline Configuration
    fields:
      pipeline:
        type: object
        description: Complete pipeline configuration object (PipelineConfig)
        required: true
      warnings:
        type: string[]
        description: Any warnings about the generated pipeline
      sub_pipelines:
        type: object[]
        description: >
          Optional sibling pipelines generated alongside the main one (e.g.
          per-item sub-pipelines referenced by a foreach stage). Each entry
          must have at least {name, stages}. Empty/absent when not needed.
  promptFiles:
    produced_by: genPrompts
    description: Generated Prompts
    fields:
      outputDir:
        type: string
        description: Absolute path to temp directory containing generated prompt .md files
        required: true
      generatedFiles:
        type: string[]
        description: List of prompt file names written (kebab-case, no .md extension)
        required: true
      hasGlobalConstraints:
        type: boolean
        description: Whether global-constraints.md was generated
        required: true
  refinedPromptFiles:
    produced_by: refinePrompts
    description: Refined Prompts
    fields:
      outputDir:
        type: string
        description: Absolute path to the temp directory containing enhanced prompt files
        required: true
      refinedFiles:
        type: string[]
        description: List of prompt file names that were enhanced (kebab-case, no .md)
        required: true
      summary:
        type: string
        description: Summary of refinements applied
        required: true
  persistResult:
    produced_by: persisting
    description: Saved Pipeline
    fields:
      pipelineId:
        type: string
        description: Pipeline directory name
        required: true
      pipelineName:
        type: string
        description: Human-readable pipeline name (defaults to pipelineId when not supplied)
        required: true
      savedFiles:
        type: string[]
        description: Files written to disk
        required: true
      validationPassed:
        type: boolean
        description: Whether the YAML passed schema validation
        required: true
      mcpSetupNeeded:
        type: object[]
        description: MCPs that were auto-registered but need API keys configured (each has name and envVars fields). Omitted when all MCPs were installed cleanly.

stages:
  - name: analyzing
    type: agent
    interactive: true
    thinking:
      type: enabled
    mcps:
      - pulsemcp
    runtime:
      engine: llm
      system_prompt: analysis
      reads:
        description: taskDescription
    effort: high
    max_turns: 50
    max_budget_usd: 4

  - name: awaitingConfirm
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: analyzing

  - parallel:
      name: generating
      stages:
        - name: genSkeleton
          type: agent
          thinking:
            type: enabled
          runtime:
            engine: llm
            system_prompt: gen-skeleton
            reads:
              design: pipelineDesign
          effort: high
          max_turns: 60
          max_budget_usd: 5

        - name: genPrompts
          type: agent
          runtime:
            engine: llm
            system_prompt: gen-prompts
            reads:
              design: pipelineDesign
            agents:
              prompt-writer:
                description: Generates a single system prompt for one pipeline stage
                prompt: >
                  You write system prompts for workflow-control pipeline stages. Given a stage
                  specification (name, type, reads, writes, outputs, purpose), produce a
                  high-quality system prompt in markdown.


                  Required structure: role definition (1-2 sentences), Available Context
                  section listing reads data, step-by-step Workflow with action verbs,
                  and Error Handling section with concrete fallbacks.


                  Critical rules:

                  - 30-80 lines per prompt. Under 30 is too vague, over 80 dilutes attention.

                  - Do NOT include a JSON output schema section — the system auto-injects
                  the exact output format at runtime. Instead, ensure your workflow steps
                  naturally produce all the fields listed in the stage's outputs.

                  - Match the permission mode: if permission_mode is "plan", never instruct
                  to read files or run commands (agent has NO tools, only reads-injected
                  context). If disallowed_tools includes Edit/Write/Bash, only instruct
                  read-only exploration. Otherwise full tool access is available.

                  - Use specific roles ("security auditor scanning OWASP vulnerabilities")
                  not generic ones ("AI assistant").
                tools:
                  - Read
                  - Write
                model: sonnet
                maxTurns: 20
          effort: high
          max_turns: 80
          max_budget_usd: 8

  - name: refinePrompts
    type: agent
    effort: high
    max_budget_usd: 4
    max_turns: 50
    runtime:
      engine: llm
      system_prompt: refine-prompts
      reads:
        promptFiles: promptFiles
        pipelineYaml: pipelineYaml.pipeline
        pipelineDesign: pipelineDesign

  - name: persisting
    type: script
    runtime:
      engine: script
      script_id: persist_pipeline
      retry:
        max_retries: 1
        back_to: generating
      reads:
        pipeline: pipelineYaml.pipeline
        subPipelines: pipelineYaml.sub_pipelines
        prompts: refinedPromptFiles
        rawPromptDir: promptFiles.outputDir
        pipelineId: pipelineDesign.pipelineId
        pipelineName: pipelineDesign.pipelineName
