name: "Tech Research (Phased)"
description: >
  Phased version of tech-research pipeline. Instead of pre-defining all 27 stages
  and condition routes at creation time, this pipeline generates each phase dynamically
  based on actual data from prior phases. Uses pipeline_source: "store" to execute
  dynamically generated sub-pipelines.
engine: claude
use_cases:
  - Technology research with adaptive depth based on findings
  - Multi-target comparison where research strategy depends on subject classification
  - Any research task where the optimal approach isn't known upfront
display:
  title_path: phase0_results.research_topic
  completion_summary_path: phase3_results.summary

store_schema:
  # Phase 0 outputs (static — always the same)
  projectContext:
    produced_by: classify
    description: "Project context and background"
    fields:
      known_facts:
        type: string[]
        description: "Known facts about the research subject"
      open_questions:
        type: string[]
        description: "Questions to investigate"
  pipelineConfig:
    produced_by: classify
    description: "Research classification and strategy"
    fields:
      research_topic:
        type: string
        description: "The topic being researched"
        required: true
      subject_type:
        type: string
        description: "Classification: web3_protocol | oss_tool | commercial_product | technical_concept"
      task_mode:
        type: string
        description: "'full' or 'explore'"
      output_types:
        type: string[]
        description: "Desired deliverable types"
      has_source_code:
        type: boolean
        description: "Whether source code is available"

  # Phase plans (generated by planning stages)
  phase1_plan:
    produced_by: plan-collection
    description: "Dynamically generated pipeline for data collection phase"
  phase2_plan:
    produced_by: plan-analysis
    description: "Dynamically generated pipeline for analysis phase"
  phase3_plan:
    produced_by: plan-output
    description: "Dynamically generated pipeline for output production phase"

  # Phase results (collected from sub-pipeline execution)
  phase1_results:
    produced_by: execute-collection
    description: "Data collection results"
  phase2_results:
    produced_by: execute-analysis
    description: "Analysis results"
  phase3_results:
    produced_by: execute-output
    description: "Final deliverables"
    fields:
      summary:
        type: string
        description: "Completion summary"

stages:
  # ── Phase 0: Classify (static — always runs the same way) ──
  - name: classify
    type: agent
    thinking:
      type: enabled
    effort: high
    max_turns: 30
    max_budget_usd: 2
    runtime:
      engine: llm
      system_prompt: classify
      reads: {}

  - name: review-classification
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: classify

  # ── Phase 1: Collection (dynamically planned) ──
  - name: plan-collection
    type: agent
    thinking:
      type: enabled
    effort: high
    max_turns: 40
    max_budget_usd: 3
    runtime:
      engine: llm
      system_prompt: plan-collection
      reads:
        projectContext: projectContext
        pipelineConfig: pipelineConfig

  - name: execute-collection
    type: pipeline
    runtime:
      engine: pipeline
      pipeline_source: store
      pipeline_key: phase1_plan
      reads:
        projectContext: projectContext
        pipelineConfig: pipelineConfig
      writes:
        - phase1_results
      timeout_sec: 3600

  # ── Phase 2: Analysis (dynamically planned based on Phase 1 data) ──
  - name: plan-analysis
    type: agent
    thinking:
      type: enabled
    effort: high
    max_turns: 40
    max_budget_usd: 3
    runtime:
      engine: llm
      system_prompt: plan-analysis
      reads:
        projectContext: projectContext
        pipelineConfig: pipelineConfig
        collectionResults: phase1_results

  - name: review-analysis-plan
    type: human_confirm
    runtime:
      engine: human_gate
      on_reject_to: plan-analysis

  - name: execute-analysis
    type: pipeline
    runtime:
      engine: pipeline
      pipeline_source: store
      pipeline_key: phase2_plan
      reads:
        projectContext: projectContext
        pipelineConfig: pipelineConfig
        collectionResults: phase1_results
      writes:
        - phase2_results
      timeout_sec: 3600

  # ── Phase 3: Output Production (dynamically planned based on Phase 1+2 data) ──
  - name: plan-output
    type: agent
    thinking:
      type: enabled
    effort: high
    max_turns: 40
    max_budget_usd: 3
    runtime:
      engine: llm
      system_prompt: plan-output
      reads:
        pipelineConfig: pipelineConfig
        collectionResults: phase1_results
        analysisResults: phase2_results

  - name: execute-output
    type: pipeline
    runtime:
      engine: pipeline
      pipeline_source: store
      pipeline_key: phase3_plan
      reads:
        projectContext: projectContext
        pipelineConfig: pipelineConfig
        collectionResults: phase1_results
        analysisResults: phase2_results
      writes:
        - phase3_results
      timeout_sec: 3600

inline_prompts:
  classify: |
    # Research Classifier

    You are an expert research strategist. Your job is to analyze the user's research request and produce a structured classification that will guide the rest of the pipeline.

    ## Steps

    1. Read the task description carefully
    2. Identify the research topic, subject type, and desired outputs
    3. Classify the subject: web3_protocol, oss_tool, commercial_product, technical_concept, architecture_decision, or hybrid
    4. Determine the task mode: "full" (deep analysis with benchmarks and recommendations) or "explore" (broad landscape survey)
    5. List known facts and open questions
    6. Identify whether source code is available for analysis

    ## Output

    Return JSON with two top-level keys:
    - `projectContext`: { known_facts: string[], open_questions: string[] }
    - `pipelineConfig`: { research_topic, subject_type, task_mode, output_types, has_source_code, ... }

    Be thorough in classification — downstream phases will use this to decide what research to do.

  plan-collection: |
    # Collection Phase Planner

    You are designing the data collection phase of a research pipeline. Based on the classification from Phase 0, decide what data sources to collect from and how.

    ## Available Context

    Read `projectContext` and `pipelineConfig` using `get_store_value` to understand:
    - What is being researched (topic, subject_type)
    - What mode we're in (full vs explore)
    - Whether source code is available
    - What community channels exist

    ## Your Job

    Design a sub-pipeline (3-6 stages) that collects primary data. Consider:
    - For web3_protocol: on-chain data, whitepaper, documentation, GitHub repos
    - For oss_tool: GitHub repo analysis, documentation, community discussions
    - For commercial_product: official docs, pricing pages, API docs, reviews
    - For technical_concept: academic papers, reference implementations, tutorials

    Only include stages for data sources that are ACTUALLY AVAILABLE based on the classification.
    Do NOT include stages for source code analysis if has_source_code is false.
    Do NOT include community intel stages if no community channels are listed.

    Output a valid PipelineConfig JSON with store_schema, stages, and inline_prompts.

  plan-analysis: |
    # Analysis Phase Planner

    You are designing the analysis phase. Based on the collected data from Phase 1, decide what analysis to perform.

    ## Available Context

    Read `pipelineConfig` and `collectionResults` to understand:
    - What data was actually collected (not just what was planned)
    - What quality/completeness issues exist
    - What the research mode is (full vs explore)

    ## Your Job

    Design a sub-pipeline (2-5 stages) for analysis. Consider:
    - Full mode: verification, benchmarking, pain point analysis, solution design
    - Explore mode: landscape analysis, comparison matrix, gap identification
    - Only include verification stages for claims that CAN be independently verified
    - Only include benchmarking if competitor products were identified AND data is available

    Adapt to what was ACTUALLY collected, not what was planned. If collection found unexpected gaps, design analysis stages that work around them.

    Output a valid PipelineConfig JSON with store_schema, stages, and inline_prompts.

  plan-output: |
    # Output Phase Planner

    You are designing the output production phase. Based on collected data and analysis, decide what deliverables to produce.

    ## Available Context

    Read `pipelineConfig`, `collectionResults`, and `analysisResults` to understand:
    - What deliverable types were requested
    - What data and analysis are available to support them
    - What confidence level exists for different findings

    ## Your Job

    Design a sub-pipeline (2-4 stages) for output production:
    1. Output planning: structure each deliverable based on available findings
    2. Content production: write each deliverable (can use foreach for multiple)
    3. Fact-checking: verify claims in deliverables against collected data
    4. Final review: quality check and summary

    Only produce deliverables that are SUPPORTED by the available data. If analysis found low confidence for certain claims, note this in the deliverable rather than omitting it.

    Output a valid PipelineConfig JSON with store_schema, stages, and inline_prompts.
