# docker-compose.yml — workflow-control one-command local deployment.
#
# Ports:
#   - :3001  Hono API (server)
#   - :3000  Next.js dashboard (web)
#
# Volumes:
#   - ./data              -> /data              (SQLite store; persistent)
#
# The browser hits the server directly on localhost:3001, so NEXT_PUBLIC_API_URL
# must be the host URL — not the in-network `http://server:3001`.
#
# Worktree allocation (B9 / Phase 5C) is opt-in per task via
# `worktreeSourceRepo` + `worktreeRoot` in the run_pipeline call;
# there's no longer a global REPOS_BASE_PATH / WORKTREES_BASE_PATH
# requirement. If your pipelines need worktrees, mount a writable
# host volume into the container (e.g.
# `- $HOME/worktrees:/worktrees`) and pass `worktreeRoot:/worktrees`
# at task launch.

services:
  server:
    build:
      context: .
      target: server
    image: workflow-control-server:local
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATA_DIR: /data
      CLAUDE_PATH: /usr/local/bin/claude
      PORT: "3001"
    volumes:
      - ./data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    image: workflow-control-web:local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - server
    restart: unless-stopped
